# MythicMobs Agent — RAG 评估集 (133 题)
#
# 每题字段：
#   id              —— 短标识符
#   query           —— 自然语言查询（中或英；模拟真实用户输入的形态）
#   expected_sources —— **任意一条**命中即算该题召回成功（支持子串匹配）
#   expected_wiki   —— mythicmobs / crucible / any
#   tags            —— 仅用于分组报表，不参与评分
#
# 选题原则：
#   - 中英文均衡，覆盖中英 embedding 健康度
#   - 涵盖 mob / item / metaskill / mechanic / targeter / condition / trigger / drop 8 类
#   - crucible 专题题 ≥ 20（onUse / onConsume / Recipes / Furniture / Bags / Ammo 等）
#   - 短关键词、长描述、组合需求三种形态均有
#   - 命名误写、近义词、模糊描述各保留一部分，用于压测 hybrid 检索鲁棒性

